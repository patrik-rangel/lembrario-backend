  db:
    image: postgres:14
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=lembrario  # <--- Sincronizado com o .env
    ports:
      - "5432:5432"            # <--- Essencial para o go run externo funcionar
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: always

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: lembrario-meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: "masterKey123"
      MEILI_ENV: "development"
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped

volumes:
  db-data:
  meili_data:
